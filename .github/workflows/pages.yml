name: Deploy to GitHub Pages

# The game is fully static, so we publish the repo root straight to Pages.
# This gives a public https URL that works on any device, including mobile.
# Only `main` deploys (Pages' environment is locked to the default branch);
# triggering on other branches just made runs collide and cancel each other.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy — let it finish so the site always updates.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # Pages must be enabled once in Settings -> Pages -> Source: GitHub
        # Actions (the Actions token can deploy but can't create the site).
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Repo root holds index.html + assets; that's the whole site.
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
